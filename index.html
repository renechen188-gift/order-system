        <div class="count-period-sub">${s.status === 'pending' ? '尚未盤點，點此開始' : s.status === 'in_progress' ? '盤點中，點此繼續' : s.status === 'completed' ? '已送出，等待審核' : '已核准'}</div>
      </div>
      <span class="count-status ${s.status}">${COUNT_STATUS_LABEL[s.status]}</span>
    </div>`).join('') || '<div class="empty-state"><div class="icon">📋</div><div class="msg">目前沒有盤點任務</div></div>'}`;
}

async function openStoreCount(sheetId, period) {
  const el = document.getElementById('countPage');
  const items = allItems.filter(i => i.needs_count);

  const { data: existing } = await sb.from('inventory_counts').select('*').eq('store_id', currentUser.store_id).eq('count_period', period);
  const saved = {};
  (existing || []).forEach(c => { saved[c.item_id] = c; });

  // Mark as in_progress
  await sb.from('count_sheets').update({ status: 'in_progress' }).eq('id', sheetId).in('status', ['pending', 'in_progress']);

  const cats = ['ALL', ...new Set(items.map(i => i.category))];
  window._countSheetId = sheetId;
  window._countPeriod = period;
  window._countSaved = saved;
  window._countCat = 'ALL';

  renderStoreCount(el, items, cats);
}

function renderStoreCount(el, items, cats) {
  const saved = window._countSaved;
  const cat = window._countCat;
  const filtered = cat === 'ALL' ? items : items.filter(i => i.category === cat);

  el.innerHTML = `
    <div class="config-section">
      <div style="display:flex;align-items:center;gap:8px"><button style="background:none;border:none;font-size:18px;cursor:pointer" onclick="loadCountStore()">←</button><div class="config-section-title">${formatPeriod(window._countPeriod)}</div></div>
      <div class="config-section-sub">填寫各品項實際庫存數量</div>
    </div>
    <div class="cat-filter" style="padding:10px 16px">${cats.map(c => `<button class="cat-btn ${cat === c ? 'active' : ''}" onclick="window._countCat='${c}';renderStoreCount(document.getElementById('countPage'),allItems.filter(i=>i.needs_count),${JSON.stringify(cats).replace(/"/g, "'")})">${c === 'ALL' ? '全部' : c}</button>`).join('')}</div>
    <div class="count-bar" style="padding:6px 16px;font-size:12px;color:var(--text3)">${filtered.length} 項品項</div>
    ${filtered.map(item => {
      const s = saved[item.id];
      return `<div class="count-item">
        <div class="count-item-info"><div class="count-item-name">${item.name}</div><div class="count-item-sub">${item.category} · ${item.unit}${item.purchase_price ? ' · $' + item.purchase_price : ''}</div></div>
        <input type="number" class="count-input" id="ci_${item.id}" value="${s ? s.actual_qty : ''}" placeholder="0" inputmode="decimal" min="0" step="0.5">
        <div class="count-unit">${item.unit}</div>
      </div>`;
    }).join('')}
    <div style="padding:16px"><button class="form-save" onclick="submitStoreCount()">送出盤點</button></div>`;
}

async function submitStoreCount() {
  const items = allItems.filter(i => i.needs_count);
  const rows = [];
  let empty = 0;
  items.forEach(item => {
    const input = document.getElementById('ci_' + item.id);
    if (!input) return;
    const val = parseFloat(input.value);
    if (isNaN(val)) { empty++; return; }
    rows.push({ store_id: currentUser.store_id, item_id: item.id, count_period: window._countPeriod, system_qty: 0, actual_qty: val, counted_by: currentUser.id });
  });

  if (empty > 0 && !confirm(`有 ${empty} 項未填（將視為 0），確定送出？`)) return;
  // Fill empty as 0
  items.forEach(item => {
    if (!rows.find(r => r.item_id === item.id)) {
      rows.push({ store_id: currentUser.store_id, item_id: item.id, count_period: window._countPeriod, system_qty: 0, actual_qty: 0, counted_by: currentUser.id });
    }
  });

  try {
    // Delete old counts for this period/store then insert
    await sb.from('inventory_counts').delete().eq('store_id', currentUser.store_id).eq('count_period', window._countPeriod);
    const { error } = await sb.from('inventory_counts').insert(rows);
    if (error) throw error;

    await sb.from('count_sheets').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', window._countSheetId);
    alert('盤點已送出！');
    loadCountStore();
  } catch (err) { alert('送出失敗：' + (err.message || err)); }
}

async function viewStoreCountReadonly(sheetId, period) {
  const el = document.getElementById('countPage');
  const items = allItems.filter(i => i.needs_count);
  const { data: counts } = await sb.from('inventory_counts').select('*').eq('store_id', currentUser.store_id).eq('count_period', period);
  const countMap = {};
  (counts || []).forEach(c => { countMap[c.item_id] = c; });

  let totalValue = 0;
  items.forEach(i => { if (countMap[i.id]) totalValue += (countMap[i.id].actual_qty || 0) * (i.purchase_price || 0); });

  el.innerHTML = `
    <div class="config-section">
      <div style="display:flex;align-items:center;gap:8px"><button style="background:none;border:none;font-size:18px;cursor:pointer" onclick="loadCountStore()">←</button><div class="config-section-title">${formatPeriod(period)}</div></div>
      <div class="config-section-sub">已核准 · 盤存金額 $${totalValue.toLocaleString()}</div>
    </div>
    ${items.map(item => {
      const c = countMap[item.id];
      return `<div class="count-item">
        <div class="count-item-info"><div class="count-item-name">${item.name}</div><div class="count-item-sub">${item.category} · ${item.unit}</div></div>
        <div style="text-align:right;font-size:16px;font-weight:600">${c ? c.actual_qty : 0}</div>
        <div class="count-unit">${item.unit}</div>
      </div>`;
    }).join('')}`;
}

// ══════════ TRANSFERS (調撥紀錄) ══════════
let transferFilter = 'all';

async function loadTransfer() {
  const el = document.getElementById('transferPage');
  const isAdmin = currentUser.role === 'admin';

  const { data: transfers, error } = await sb.from('transfers').select('*, from_store:stores!transfers_from_store_id_fkey(name), to_store:stores!transfers_to_store_id_fkey(name), requester:users!transfers_requested_by_fkey(name)').order('requested_at', { ascending: false }).limit(100);
  if (error) { el.innerHTML = `<div class="empty-state"><div class="msg">載入失敗：${error.message}</div></div>`; return; }

  const all = transfers || [];
  const unreturned = all.filter(t => t.status === 'active');
  const returned = all.filter(t => t.status === 'returned');
  const shown = transferFilter === 'pending' ? unreturned : transferFilter === 'history' ? returned : all;

  el.innerHTML = `
    <div class="mgmt-bar"><span class="count">${unreturned.length} 筆未歸還</span><button class="add-btn" onclick="openTransferForm()">＋ 新增調撥</button></div>
    <div class="tf-type-tabs">
      <button class="tf-type-tab ${transferFilter === 'all' ? 'active' : ''}" onclick="transferFilter='all';loadTransfer()">全部 (${all.length})</button>
      <button class="tf-type-tab ${transferFilter === 'pending' ? 'active' : ''}" onclick="transferFilter='pending';loadTransfer()">未歸還 (${unreturned.length})</button>
      <button class="tf-type-tab ${transferFilter === 'history' ? 'active' : ''}" onclick="transferFilter='history';loadTransfer()">已歸還 (${returned.length})</button>
    </div>
    ${shown.length ? shown.map(t => `<div class="tf-card">
      <div class="tf-card-top">
        <div><span class="tf-card-stores">${t.from_store?.name || '?'}</span><span class="tf-card-arrow">→</span><span class="tf-card-stores">${t.to_store?.name || '?'}</span></div>
        <span class="tf-badge ${t.status === 'returned' ? 'received' : 'requested'}">${t.status === 'returned' ? '已歸還' : '未歸還'}</span>
      </div>
      <div class="tf-card-items">${t.note || '（無描述）'}</div>
      <div class="tf-card-meta">
        ${t.requester?.name || ''} · ${new Date(t.requested_at).toLocaleDateString('zh-TW')}
        ${t.received_at ? ' · 歸還於 ' + new Date(t.received_at).toLocaleDateString('zh-TW') : ''}
      </div>
      ${t.status === 'active' && (isAdmin || currentUser.store_id === t.from_store_id || currentUser.store_id === t.to_store_id) ? `<div style="margin-top:8px"><button class="tf-btn-green" style="padding:6px 16px;font-size:13px;border:none;border-radius:8px;cursor:pointer" onclick="event.stopPropagation();markReturned('${t.id}')">標記已歸還</button></div>` : ''}
    </div>`).join('') : '<div class="empty-state"><div class="icon">📦</div><div class="msg">沒有調撥紀錄</div></div>'}`;
}

function openTransferForm() {
  const myStoreId = currentUser.store_id;
  const isAdmin = currentUser.role === 'admin';
  const stores = allStores.filter(s => s.type === 'store');

  document.getElementById('formOverlay')?.remove();
  const overlay = document.createElement('div');
  overlay.id = 'formOverlay';
  overlay.className = 'form-overlay show';
  overlay.innerHTML = `
    <div class="form-sheet">
      <div class="form-handle"></div>
      <div class="form-header"><div class="form-title">新增調撥紀錄</div><button class="form-close" onclick="closeTransferForm()">✕</button></div>
      <div class="form-body">
        ${isAdmin ? `
        <div class="form-group"><label class="form-label">借出門店 *</label>
          <select class="form-input" id="tfFrom" style="padding:10px 14px">
            <option value="">選擇門店</option>
            ${stores.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
          </select></div>
        <div class="form-group"><label class="form-label">借入門店 *</label>
          <select class="form-input" id="tfTo" style="padding:10px 14px">
            <option value="">選擇門店</option>
            ${stores.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
          </select></div>
        ` : `
        <div class="form-group"><label class="form-label">對方門店 *</label>
          <select class="form-input" id="tfTarget" style="padding:10px 14px">
            <option value="">選擇門店</option>
            ${stores.filter(s => s.id !== myStoreId).map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
          </select></div>
        <div class="form-group"><label class="form-label">方向</label>
          <div class="chip-group" id="tfDir">
            <span class="chip active" data-val="out" onclick="selectChip('tfDir',this)">我方借出</span>
            <span class="chip" data-val="in" onclick="selectChip('tfDir',this)">我方借入</span>
          </div></div>
        `}
        <div class="form-group"><label class="form-label">調撥內容 *</label>
          <textarea class="form-input" id="tfNote" rows="3" placeholder="例：涼皮 ×10、麻醬包 ×20" style="resize:vertical;font-family:inherit"></textarea></div>
        <button class="form-save" onclick="submitTransfer()">送出</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeTransferForm() { document.getElementById('formOverlay')?.remove(); }

async function submitTransfer() {
  const isAdmin = currentUser.role === 'admin';
  let fromId, toId;

  if (isAdmin) {
    fromId = document.getElementById('tfFrom').value;
    toId = document.getElementById('tfTo').value;
    if (!fromId || !toId) { alert('請選擇借出和借入門店'); return; }
    if (fromId === toId) { alert('借出和借入不能是同一門店'); return; }
  } else {
    const targetId = document.getElementById('tfTarget').value;
    if (!targetId) { alert('請選擇對方門店'); return; }
    const dir = document.querySelector('#tfDir .chip.active')?.dataset.val || 'out';
    fromId = dir === 'out' ? currentUser.store_id : targetId;
    toId = dir === 'out' ? targetId : currentUser.store_id;
  }

  const note = document.getElementById('tfNote').value.trim();
  if (!note) { alert('請填寫調撥內容'); return; }

  const { error } = await sb.from('transfers').insert({
    from_store_id: fromId, to_store_id: toId,
    type: 'transfer', status: 'active',
    requested_by: currentUser.id, note
  });
  if (error) { alert('建立失敗：' + error.message); return; }

  closeTransferForm();
  alert('已建立調撥紀錄');
  loadTransfer();
}

async function markReturned(tfId) {
  if (!confirm('確定標記為已歸還？')) return;
  const { error } = await sb.from('transfers').update({ status: 'returned', received_at: new Date().toISOString() }).eq('id', tfId);
  if (error) { alert('更新失敗：' + error.message); return; }
  loadTransfer();
}

// ══════════ SUPPLIERS (廠商管理) ══════════
function loadSuppliers() {
  const el = document.getElementById('suppliersPage');
  const types = { external: '外部廠商', central_kitchen: '中央廚房' };

  el.innerHTML = `
    <div class="mgmt-bar"><span class="count">${allSuppliers.length} 家廠商</span><button class="add-btn" onclick="openSupplierForm()">＋ 新增廠商</button></div>
    ${allSuppliers.map(s => `<div class="mgmt-item" onclick="openSupplierForm('${s.id}')">
      <div class="mi-info"><div class="mi-name">${s.name}</div><div class="mi-sub">${types[s.type] || s.type} · ${s.payment_method === 'monthly' ? '月結' : '付現'}${s.note ? ' · ' + s.note : ''}</div></div>
      <div class="mi-arrow">›</div>
    </div>`).join('') || '<div class="empty-state"><div class="icon">🏪</div><div class="msg">沒有廠商</div></div>'}`;
}

function openSupplierForm(supId) {
  const sup = supId ? allSuppliers.find(s => s.id === supId) : null;
  const isEdit = !!sup;
  const types = [{ v: 'external', l: '外部廠商' }, { v: 'central_kitchen', l: '中央廚房' }];
  const payments = [{ v: 'cash', l: '付現' }, { v: 'monthly', l: '月結' }];

  document.getElementById('formOverlay')?.remove();

  const overlay = document.createElement('div');
  overlay.id = 'formOverlay';
  overlay.className = 'form-overlay show';
  overlay.innerHTML = `
    <div class="form-sheet">
      <div class="form-handle"></div>
      <div class="form-header"><div class="form-title">${isEdit ? '編輯廠商' : '新增廠商'}</div><button class="form-close" onclick="closeSupplierForm()">✕</button></div>
      <div class="form-body">
        <div class="form-group"><label class="form-label">廠商名稱 *</label><input class="form-input" id="fsName" value="${sup?.name || ''}" placeholder="例：可果坊"></div>
        <div class="form-group"><label class="form-label">類型</label>
          <div class="chip-group" id="fsType">${types.map(t => `<span class="chip ${(sup?.type || 'external') === t.v ? 'active' : ''}" data-val="${t.v}" onclick="selectChip('fsType',this)">${t.l}</span>`).join('')}</div></div>
        <div class="form-group"><label class="form-label">付款方式</label>
          <div class="chip-group" id="fsPayment">${payments.map(p => `<span class="chip ${(sup?.payment_method || 'cash') === p.v ? 'active' : ''}" data-val="${p.v}" onclick="selectChip('fsPayment',this)">${p.l}</span>`).join('')}</div></div>
        <div class="form-group"><label class="form-label">備註</label><input class="form-input" id="fsNote" value="${sup?.note || ''}" placeholder="供應品項說明（選填）"></div>
        <button class="form-save" onclick="saveSupplier('${supId || ''}')">${isEdit ? '儲存變更' : '新增廠商'}</button>
        ${isEdit ? `<button class="form-delete" onclick="deleteSupplier('${supId}')">停用此廠商</button>` : ''}
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSupplierForm(); });
}

function closeSupplierForm() { document.getElementById('formOverlay')?.remove(); }

async function saveSupplier(supId) {
  const name = document.getElementById('fsName').value.trim();
  if (!name) { alert('請填寫廠商名稱'); return; }

  const data = {
    name,
    type: document.querySelector('#fsType .chip.active')?.dataset.val || 'external',
    payment_method: document.querySelector('#fsPayment .chip.active')?.dataset.val || 'cash',
    note: document.getElementById('fsNote').value.trim() || null,
    is_active: true
  };

  try {
    let savedId = supId;
    if (supId) {
      const { error } = await sb.from('suppliers').update(data).eq('id', supId);
      if (error) throw error;
    } else {
      const { data: newSup, error } = await sb.from('suppliers').insert(data).select().single();
      if (error) throw error;
      savedId = newSup.id;

      // Auto-create store_suppliers for all stores (default on)
      const stores = allStores.filter(s => s.type === 'store');
      if (stores.length) {
        await sb.from('store_suppliers').insert(stores.map(s => ({ store_id: s.id, supplier_id: savedId, is_active: true })));
      }
    }

    closeSupplierForm();
    await loadData();
    loadSuppliers();
  } catch (err) { alert('儲存失敗：' + (err.message || err)); }
}

async function deleteSupplier(supId) {
  if (!confirm('確定要停用此廠商？停用後門店將無法向此廠商叫貨。')) return;
  try {
    await sb.from('suppliers').update({ is_active: false }).eq('id', supId);
    closeSupplierForm();
    await loadData();
    loadSuppliers();
  } catch (err) { alert('停用失敗：' + (err.message || err)); }
}

// ══════════ CONFIG (配送設定) ══════════
async function loadConfig() {
  const el = document.getElementById('configPage');
  const stores = allStores.filter(s => s.type === 'store');
  const suppliers = allSuppliers;

  const { data: mappings } = await sb.from('store_suppliers').select('*');
  const mapSet = {};
  (mappings || []).forEach(m => { mapSet[m.store_id + '|' + m.supplier_id] = m; });

  el.innerHTML = `
    <div class="config-section">
      <div class="config-section-title">門店 × 廠商配送設定</div>
      <div class="config-section-sub">開啟 = 該門店可向此廠商叫貨，關閉 = 隱藏不顯示</div>
    </div>
    <div style="overflow-x:auto;background:var(--surface)">
      <table class="config-matrix">
        <thead><tr>
          <th></th>
          ${suppliers.map(s => `<th>${s.name}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${stores.map(store => `<tr>
            <td>${store.name}</td>
            ${suppliers.map(sup => {
              const rec = mapSet[store.id + '|' + sup.id];
              const isOn = rec ? rec.is_active : false;
              return `<td><div class="config-toggle ${isOn ? 'on' : ''}" data-store="${store.id}" data-supplier="${sup.id}" data-record="${rec?.id || ''}" onclick="toggleStoreSupplier(this)"></div></td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

async function toggleStoreSupplier(el) {
  if (el.classList.contains('saving')) return;
  el.classList.add('saving');

  const storeId = el.dataset.store;
  const supplierId = el.dataset.supplier;
  const recordId = el.dataset.record;
  const newState = !el.classList.contains('on');

  try {
    if (recordId) {
      await sb.from('store_suppliers').update({ is_active: newState }).eq('id', recordId);
    } else {
      const { data } = await sb.from('store_suppliers').insert({ store_id: storeId, supplier_id: supplierId, is_active: newState }).select().single();
      if (data) el.dataset.record = data.id;
    }
    el.classList.toggle('on', newState);
  } catch (err) {
    alert('更新失敗：' + (err.message || err));
  } finally {
    el.classList.remove('saving');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') doLogin(); });
